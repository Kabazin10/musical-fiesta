version: '3.8'

services:
  frontend:
    build:
      context: ./frontend    # Adjust path as necessary
      dockerfile: Dockerfile   # Adjust if your Dockerfile has a different name
    ports:
      - "3000:3000"  # Change according to your frontend config

  backend:
    build:
      context: ./backend     # Adjust path as necessary
      dockerfile: Dockerfile  # Adjust if your Dockerfile has a different name
    ports:
      - "5000:5000"  # Change according to your backend config
    environment:
      - MONGO_URI=mongodb://mongodb:27017/musical_festival  # Ensure this matches your backend setup
    depends_on:
      - mongodb

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
